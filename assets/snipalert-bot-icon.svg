<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#ff6b61"/>
      <stop offset="60%" stop-color="#e23b3b"/>
      <stop offset="100%" stop-color="#b32626"/>
    </radialGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cfd6df"/>
    </linearGradient>
    <clipPath id="headClip">
      <ellipse cx="256" cy="224" rx="104" ry="118"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- shirt (black tee shoulders) -->
  <path d="M64,512 L64,476 C64,422 150,396 256,396 C362,396 448,422 448,476 L448,512 Z" fill="#141418"/>
  <path d="M64,512 L64,476 C64,452 96,436 140,424 L140,512 Z" fill="#1d1d24" opacity="0.6"/>
  <path d="M448,512 L448,476 C448,452 416,436 372,424 L372,512 Z" fill="#1d1d24" opacity="0.6"/>

  <!-- neck -->
  <rect x="222" y="352" width="68" height="70" rx="28" fill="#cf9468"/>
  <rect x="222" y="352" width="68" height="20" fill="#b97f55" opacity="0.5"/>

  <!-- ears -->
  <ellipse cx="156" cy="244" rx="17" ry="25" fill="#e7b18c"/>
  <ellipse cx="356" cy="244" rx="17" ry="25" fill="#e7b18c"/>

  <!-- head -->
  <ellipse cx="256" cy="224" rx="104" ry="118" fill="#e7b18c"/>

  <!-- shaved-head stubble on crown -->
  <g clip-path="url(#headClip)">
    <ellipse cx="256" cy="92" rx="122" ry="86" fill="#3a3a44" opacity="0.26"/>
  </g>

  <!-- eyebrows (thick) -->
  <path d="M190,184 Q216,166 244,180 L242,191 Q216,178 192,194 Z" fill="#1b1b20"/>
  <path d="M322,184 Q296,166 268,180 L270,191 Q296,178 320,194 Z" fill="#1b1b20"/>

  <!-- smiling eyes -->
  <path d="M196,205 Q216,191 236,205 Q216,214 196,205 Z" fill="#1b1b20"/>
  <path d="M276,205 Q296,191 316,205 Q296,214 276,205 Z" fill="#1b1b20"/>
  <circle cx="210" cy="201" r="3" fill="#ffffff" opacity="0.85"/>
  <circle cx="290" cy="201" r="3" fill="#ffffff" opacity="0.85"/>

  <!-- nose -->
  <path d="M256,214 C250,244 243,258 256,264 C269,258 262,244 256,214 Z" fill="#cf9468" opacity="0.65"/>

  <!-- cheek highlights (smiling lift) -->
  <ellipse cx="208" cy="246" rx="16" ry="10" fill="#ffffff" opacity="0.10"/>
  <ellipse cx="304" cy="246" rx="16" ry="10" fill="#ffffff" opacity="0.10"/>

  <!-- big full beard -->
  <path d="M150,205
           C138,290 170,402 256,444
           C342,402 374,290 362,205
           C344,252 298,272 256,272
           C214,272 168,252 150,205 Z" fill="#1b1b20"/>
  <!-- beard sheen -->
  <path d="M256,300 C300,300 332,330 332,372 C300,412 270,430 256,438 C242,430 212,412 180,372 C180,330 212,300 256,300 Z"
        fill="#2a2a33" opacity="0.55"/>

  <!-- mustache -->
  <path d="M256,270 C234,270 212,283 204,302 C224,297 244,291 256,290 C268,291 288,297 308,302 C300,283 278,270 256,270 Z" fill="#1b1b20"/>

  <!-- smiling mouth with teeth -->
  <path d="M224,296 Q256,300 288,296 Q284,324 256,327 Q228,324 224,296 Z" fill="#7a3b3b"/>
  <path d="M230,298 Q256,303 282,298 Q279,309 256,310 Q233,309 230,298 Z" fill="#ffffff"/>

  <!-- raised arm holding scissors (left) -->
  <g>
    <!-- forearm -->
    <path d="M86,512 L138,512 C140,470 142,432 132,398 L104,404 C96,442 88,478 86,512 Z" fill="#e7b18c"/>
    <path d="M86,512 L138,512 C139,486 140,462 137,440 L92,452 C89,472 87,494 86,512 Z" fill="#d49b73" opacity="0.4"/>
    <!-- scissors -->
    <g stroke="url(#steel)" stroke-width="15" stroke-linecap="round" fill="none">
      <line x1="128" y1="330" x2="108" y2="210"/>
      <line x1="128" y1="330" x2="150" y2="214"/>
      <line x1="128" y1="330" x2="116" y2="372"/>
      <line x1="128" y1="330" x2="144" y2="372"/>
    </g>
    <circle cx="116" cy="380" r="13" fill="none" stroke="url(#steel)" stroke-width="9"/>
    <circle cx="148" cy="380" r="13" fill="none" stroke="url(#steel)" stroke-width="9"/>
    <circle cx="128" cy="330" r="8" fill="#eef2f7" stroke="#aab4c2" stroke-width="3"/>
    <!-- hand gripping the scissors -->
    <g fill="#e7b18c">
      <ellipse cx="128" cy="362" rx="34" ry="30"/>
      <ellipse cx="106" cy="348" rx="9" ry="14"/>
      <ellipse cx="122" cy="344" rx="9" ry="15"/>
      <ellipse cx="138" cy="344" rx="9" ry="15"/>
      <ellipse cx="153" cy="350" rx="9" ry="14"/>
      <ellipse cx="156" cy="368" rx="11" ry="9"/>
    </g>
  </g>

  <!-- alert "ping" badge, top-right -->
  <g>
    <circle cx="372" cy="150" r="48" fill="#b32626"/>
    <circle cx="372" cy="150" r="30" fill="#33d17a"/>
    <circle cx="372" cy="150" r="30" fill="none" stroke="#9bf3c2" stroke-opacity="0.6" stroke-width="9"/>
    <circle cx="372" cy="150" r="11" fill="#0e2a1b"/>
  </g>
</svg>
