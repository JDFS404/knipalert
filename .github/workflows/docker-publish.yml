name: build-and-push

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      # 1) Build locally (no push yet) so we can smoke-test before publishing.
      - name: Build (load, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # 2) Smoke test: boot the image with dummy env and import everything
      #    (catches syntax/import errors + missing deps before it can go live).
      - name: Smoke test
        run: |
          IMG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          docker run --rm -e DISCORD_BOT_TOKEN=dummy -e DISCORD_CHANNEL_ID=1 "$IMG" \
            python -c "import knipalert.run, googleapiclient.discovery, google.oauth2.service_account, discord; print('smoke ok')"

      # 3) Only now publish (smoke test passed -> a broken commit never becomes :latest).
      - name: Push
        run: echo "${{ steps.meta.outputs.tags }}" | xargs -L1 docker push
